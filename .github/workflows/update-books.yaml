name: Update Issue Template from Books List

on:
  workflow_dispatch:
  push:
    paths:
      - '00_meta/books.json'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with: { python-version: '3.11' }
      - name: Install PyYAML
        run: pip install PyYAML
      - name: Run Update Script
        run: python scripts/update_template.py
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/ISSUE_TEMPLATE/study_log.yaml
          git commit -m "chore: sync books to issue template" || exit 0
          git push
