name: AI Study Automation

on:
  issues:
    types: [labeled]

jobs:
  ai-process:
    if: github.event.label.name == 'action:summary' || github.event.label.name == 'action:review'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Call Gemini API
        id: gemini
        env:
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          BODY="${{ github.event.issue.body }}"
          BOOK=$(echo "$BODY" | grep -A 1 "### 参考書名" | tail -n 1 | xargs)
          CHAPTER=$(echo "$BODY" | grep -A 1 "### 章番号" | tail -n 1 | xargs | sed 's/[^0-9]//g')
          OWN_WORDS=$(echo "$BODY" | sed -n '/### この章を一言で言うと？/,/###/p' | sed '1d;$d' | xargs -0)
          CONTENT=$(echo "$BODY" | sed -n '/### 学習メモ/,/###/p' | sed '1d;$d' | xargs -0)
          PROS_CONS=$(echo "$BODY" | sed -n '/### この技術の「使いどころ」と「注意点」/,/###/p' | sed '1d;$d' | xargs -0)
          QUIZ_ANS=$(echo "$BODY" | sed -n '/### 【AI回答用】クイズの回答欄/,$p' | sed '1d' | xargs -0)

          if [ -z "$BOOK" ] || [ -z "$CHAPTER" ] || [ -z "$CONTENT" ]; then
            echo "Error: 必須項目が不足しています。" && exit 1
          fi

          DEST_DIR=$(jq -r --arg TITLE "$BOOK" '.[] | select(.title == $TITLE) | .dir' 00_meta/books.json)
          if [ -z "$DEST_DIR" ] || [ "$DEST_DIR" == "null" ]; then
            echo "Error: 'books.json' に参考書名 '$BOOK' が登録されていません。" && exit 1
          fi

          if [ "${{ github.event.label.name }}" == "action:summary" ]; then
            PROMPT_FILE=".github/prompts/summary.txt"
          else
            PROMPT_FILE=".github/prompts/review.txt"
          fi
          INSTRUCTIONS=$(cat "$PROMPT_FILE")

          FULL_PROMPT="${INSTRUCTIONS}\n\n一言要約: ${OWN_WORDS}\n学習メモ: ${CONTENT}\n推論（使いどころ）: ${PROS_CONS}\nクイズ回答: ${QUIZ_ANS}"
          JSON_DATA=$(jq -n --arg msg "$FULL_PROMPT" '{contents: [{parts: [{text: $msg}]}]}')

          HTTP_STATUS=$(curl -s -o api_response.json -w "%{http_code}" -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=$API_KEY" \
            -H "Content-Type: application/json" \
            -d "$JSON_DATA")

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Error: API Fail ($HTTP_STATUS)" && cat api_response.json && exit 1
          fi
          jq -r '.candidates[0].content.parts[0].text' api_response.json > ai_output.txt
          
          echo "dest_dir=$DEST_DIR" >> $GITHUB_OUTPUT
          echo "chapter=chapter$CHAPTER" >> $GITHUB_OUTPUT
          echo "content=$CONTENT" >> $GITHUB_OUTPUT

      - name: Create and Push Files
        if: github.event.label.name == 'action:summary'
        run: |
          DIR="${{ steps.gemini.outputs.dest_dir }}"
          PREFIX="${{ steps.gemini.outputs.chapter }}"
          mkdir -p "$DIR"

          {
            echo "# ${{ github.event.issue.title }} - Memo"
            echo "Source: #${{ github.event.issue.number }}"
            echo -e "\n---\n"
            echo "${{ steps.gemini.outputs.content }}"
          } > "$DIR/${PREFIX}_memo.md"

          {
            echo "# ${{ github.event.issue.title }} - Summary"
            echo "Source: #${{ github.event.issue.number }}"
            echo -e "\n---\n"
            cat ai_output.txt
          } > "$DIR/${PREFIX}_summary.md"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$DIR/${PREFIX}_*.md"
          if ! git diff --cached --exit-code --quiet; then
            git commit -m "feat: add $PREFIX memo and summary"
            git push
          fi

      - name: Post Review Comment
        if: github.event.label.name == 'action:review'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body-file ai_output.txt
