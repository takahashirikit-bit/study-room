name: AI Study Automation

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  ai-process:
    if: >
      (github.event_name == 'issues' && (github.event.label.name == 'action:summary' || github.event.label.name == 'action:review')) ||
      (github.event_name == 'issue_comment' && contains(github.event.issue.labels.*.name, 'auto-process') && github.event.comment.user.type != 'Bot')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Call Gemini API
        id: gemini
        env:
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RAW_BODY: ${{ github.event.issue.body }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODEL_NAME: ${{ vars.GEMINI_MODEL || 'gemini-flash-latest' }}
        run: |
          echo "$RAW_BODY" > issue_body.txt
          BOOK=$(sed -n '/### 書籍名/,/###/p' issue_body.txt | sed '1d;$d' | xargs)
          CHAPTER=$(sed -n '/### 章番号/,/###/p' issue_body.txt | sed '1d;$d' | xargs | sed 's/[^0-9]//g')
          extract_content() {
            awk -v start="$1" '
              $0 ~ start {found=1; next}
              found && /^### / {found=0}
              found {print $0}
            ' issue_body.txt
          }

          OWN_WORDS=$(extract_content "### この章を一言で言うと？")
          CONTENT=$(extract_content "### 学習メモ")
          PROS_CONS=$(extract_content "### この技術の「使いどころ」と「注意点」")
          QUIZ_ANS=$(extract_content "### 【AI回答用】クイズの回答欄")
          echo "Debug: BOOK='$BOOK'"
          echo "Debug: CHAPTER='$CHAPTER'"
          echo "Debug: CONTENT_LENGTH=${#CONTENT}"
          if [ -z "$BOOK" ] || [ -z "$CHAPTER" ] || [ -z "$CONTENT" ]; then
            echo "Error: 項目の抽出に失敗しました。Issueの形式を確認してください。"
            exit 1
          fi

          DEST_DIR=$(jq -r --arg TITLE "$BOOK" '.[] | select(.title == $TITLE) | .dir' 00_meta/books.json || echo "")

          if [ "${{ github.event_name }}" == "issues" ] && [ "${{ github.event.label.name }}" == "action:summary" ]; then
            PROMPT_FILE=".github/prompts/summary.txt"

            OWN_WORDS=$(awk -v start="### この章を一言で言うと？" '$0 ~ start {found=1; next} found && /^### / {found=0} found {print $0}' issue_body.txt)
            CONTENT=$(awk -v start="### 学習メモ" '$0 ~ start {found=1; next} found && /^### / {found=0} found {print $0}' issue_body.txt)
            PROS_CONS=$(awk -v start="### この技術の「使いどころ」と「注意点」" '$0 ~ start {found=1; next} found && /^### / {found=0} found {print $0}' issue_body.txt)

            USER_INPUT="一言要約: $OWN_WORDS\n学習メモ: $CONTENT\n推論: $PROS_CONS"

            else
            PROMPT_FILE=".github/prompts/review.txt"            
            COMMENTS=$(gh issue view ${{ github.event.issue.number }} --json comments -q '
              .comments[] | "[\(.author.login)]\n\(.body)\n---"
            ')

            USER_INPUT="【学習メモ（初期コンテキスト）】\n$RAW_BODY\n\n【これまでの対話履歴（最新のコメントに対して評価してください）】\n$COMMENTS"
          fi
          INSTRUCTIONS=$(cat "$PROMPT_FILE")

          JSON_DATA=$(jq -n \
            --arg inst "$INSTRUCTIONS" \
            --arg text "$USER_INPUT" \
            '{contents: [{parts: [{text: ($inst + "\n\n" + $text)}]}]}')

          HTTP_STATUS=$(curl -s -o api_response.json -w "%{http_code}" \
            --retry 5 \
            --retry-delay 10 \
            --retry-all-errors \
            -X POST "https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=$API_KEY" \
            -H "Content-Type: application/json" \
            -d "$JSON_DATA")

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Error: API Fail ($HTTP_STATUS)" && cat api_response.json && exit 1
          fi          
          jq -r '.candidates[0].content.parts[0].text' api_response.json > ai_output.txt
          
          echo "dest_dir=$DEST_DIR" >> $GITHUB_OUTPUT
          echo "chapter=chapter$CHAPTER" >> $GITHUB_OUTPUT
          {
            echo "content<<EOF"
            echo "$CONTENT"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create and Push Files
        if: github.event.label.name == 'action:summary'
        run: |
          DIR="${{ steps.gemini.outputs.dest_dir }}"
          PREFIX="${{ steps.gemini.outputs.chapter }}"
          mkdir -p "$DIR"

          {
            echo "# ${{ github.event.issue.title }} - Memo"
            echo "Source: #${{ github.event.issue.number }}"
            echo -e "\n---\n"
            echo "${{ steps.gemini.outputs.content }}"
          } > "$DIR/${PREFIX}_memo.md"

          {
            echo "# ${{ github.event.issue.title }} - Summary"
            echo "Source: #${{ github.event.issue.number }}"
            echo -e "\n---\n"
            cat ai_output.txt
          } > "$DIR/${PREFIX}_summary.md"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$DIR/${PREFIX}_*.md"
          if ! git diff --cached --exit-code --quiet; then
            git commit -m "feat: add $PREFIX memo and summary"
            git push
          fi

      - name: Post Review Comment
        if: github.event_name == 'issue_comment' || github.event.label.name == 'action:review'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body-file ai_output.txt
